<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EduManage ERP - Mark Attendance</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
          "surface-bright": "#f9f9ff",
          "surface-container-low": "#f1f3ff",
          "surface-container": "#e9edff",
          "surface-container-lowest": "#ffffff",
          "outline-variant": "#c4c6cf",
          "outline": "#74777f",
          "on-surface-variant": "#43474e",
          "on-surface": "#141b2b",
          "primary": "#022448",
          "on-primary": "#ffffff",
          "primary-container": "#1e3a5f",
          "on-primary-container": "#8aa4cf",
          "on-primary-fixed-variant": "#2d486d",
          "secondary": "#0051d5",
          "error": "#ba1a1a"
        }
      }
    }
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
  body { background-color: #f9f9ff; font-family: 'Inter', sans-serif; }
  .zebra-row:nth-child(even) { background-color: #EFF6FF; }
</style>
</head>
<body class="text-on-surface">

<aside class="flex flex-col h-screen fixed left-0 top-0 py-6 px-4 bg-primary w-64 z-50">
  <div class="mb-10 px-2">
    <h1 class="text-lg font-bold text-white">EduManage ERP</h1>
    <p class="text-xs text-on-primary-container opacity-70 uppercase tracking-widest mt-1">Faculty Portal</p>
  </div>
  <nav class="flex-1 space-y-1">
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary-container bg-primary-container rounded-lg font-bold" href="#">
      <span class="material-symbols-outlined">calendar_today</span><span>Attendance</span>
    </a>
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary-fixed-variant hover:text-white hover:bg-primary-container/20 rounded-lg transition-colors" href="../enter_marks_faculty_portal/code.html">
      <span class="material-symbols-outlined">grade</span><span>Enter Marks</span>
    </a>
  </nav>
  <div class="mt-auto border-t border-white/10 pt-4">
    <div class="px-4 py-2">
      <p class="text-sm font-bold text-white" id="faculty-name">Loading...</p>
      <p class="text-xs text-on-primary-container opacity-70">Faculty</p>
    </div>
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary-fixed-variant hover:text-white hover:bg-primary-container/20 rounded-lg transition-colors cursor-pointer" onclick="logout()">
      <span class="material-symbols-outlined">logout</span><span>Logout</span>
    </a>
  </div>
</aside>

<main class="ml-64 min-h-screen">
  <header class="flex justify-between items-center w-full px-6 h-16 sticky top-0 bg-surface-bright border-b border-outline-variant z-40">
    <h2 class="text-xl font-bold text-primary">Mark Attendance</h2>
  </header>

  <div class="p-6 max-w-[1280px]">

    <!-- Controls -->
    <div class="bg-white border border-outline-variant rounded-xl p-4 mb-6">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
          <label class="block text-xs font-semibold text-on-surface-variant uppercase mb-1">Subject ID</label>
          <input id="subject-id" class="w-full px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20" placeholder="Enter Subject ID (UUID)"/>
        </div>
        <div>
          <label class="block text-xs font-semibold text-on-surface-variant uppercase mb-1">Date</label>
          <input id="attendance-date" type="date" class="w-full px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20"/>
        </div>
        <div>
          <label class="block text-xs font-semibold text-on-surface-variant uppercase mb-1">Semester</label>
          <input id="semester" type="number" min="1" max="8" class="w-full px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20" placeholder="1-8"/>
        </div>
      </div>
      <button onclick="loadStudents()" class="mt-4 bg-primary text-white px-6 py-2 rounded-lg font-semibold hover:opacity-90">
        Load Students
      </button>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-3 gap-4 mb-6 hidden" id="stats-row">
      <div class="bg-white border border-outline-variant rounded-xl p-4">
        <p class="text-xs text-on-surface-variant uppercase font-semibold">Total</p>
        <p class="text-2xl font-bold text-primary" id="total-count">0</p>
      </div>
      <div class="bg-white border border-outline-variant rounded-xl p-4">
        <p class="text-xs text-on-surface-variant uppercase font-semibold">Present</p>
        <p class="text-2xl font-bold text-green-700" id="present-count">0</p>
      </div>
      <div class="bg-white border border-outline-variant rounded-xl p-4">
        <p class="text-xs text-on-surface-variant uppercase font-semibold">Absent</p>
        <p class="text-2xl font-bold text-error" id="absent-count">0</p>
      </div>
    </div>

    <!-- Students Table -->
    <div id="students-section" class="hidden">
      <div class="bg-white rounded-xl border border-outline-variant overflow-hidden shadow-sm mb-4">
        <div class="overflow-x-auto">
          <table class="w-full text-left">
            <thead class="bg-primary text-white">
              <tr>
                <th class="px-6 py-3 text-xs font-semibold uppercase">Roll No</th>
                <th class="px-6 py-3 text-xs font-semibold uppercase">Name</th>
                <th class="px-6 py-3 text-xs font-semibold uppercase">Status</th>
                <th class="px-6 py-3 text-xs font-semibold uppercase text-center">Present</th>
              </tr>
            </thead>
            <tbody id="attendance-table"></tbody>
          </table>
        </div>
      </div>
      <button onclick="submitAttendance()" id="submit-btn" class="w-full bg-primary text-white py-3 rounded-lg font-bold hover:opacity-90 flex items-center justify-center gap-2">
        <span class="material-symbols-outlined">save</span> Submit Attendance
      </button>
    </div>

    <div id="message-box" class="hidden mt-4 p-4 rounded-lg text-sm font-semibold"></div>
  </div>
</main>

<script>
  const API_URL = 'https://student-erp-backend-v7f3.onrender.com';
  const token = localStorage.getItem('token');
  const user = JSON.parse(localStorage.getItem('user') || '{}');

  const role = user?.roles?.name;

  if (!token || role !== 'faculty') {
    alert('Access denied. Faculty only.');
    window.location.href = '../login_edumanage_erp/code.html';
  }

  document.getElementById('faculty-name').textContent = user.full_name || 'Faculty';

  // Set today's date
  document.getElementById('attendance-date').value = new Date().toISOString().split('T')[0];

  const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
  let students = [];

  async function loadStudents() {
    const semester = document.getElementById('semester').value;
    if (!semester) { showMessage('Please enter a semester', 'error'); return; }

    try {
      const res = await fetch(`${API_URL}/api/students?semester=${semester}`, { headers });
      students = await res.json();

      if (!students.length) {
        showMessage('No students found for this semester', 'error');
        return;
      }

      document.getElementById('stats-row').classList.remove('hidden');
      document.getElementById('students-section').classList.remove('hidden');
      document.getElementById('total-count').textContent = students.length;
      document.getElementById('present-count').textContent = students.length;
      document.getElementById('absent-count').textContent = 0;

      const tbody = document.getElementById('attendance-table');
      tbody.innerHTML = students.map((s, i) => `
        <tr class="zebra-row border-b border-outline-variant/30">
          <td class="px-6 py-3 font-mono text-on-surface-variant">${s.enrollment_number}</td>
          <td class="px-6 py-3 font-bold">${s.users?.full_name || 'N/A'}</td>
          <td class="px-6 py-3">
            <span class="status-badge-${i} px-2 py-1 rounded-full text-xs font-bold bg-green-100 text-green-800">Present</span>
          </td>
          <td class="px-6 py-3 text-center">
            <input type="checkbox" checked class="attendance-check w-5 h-5 accent-primary cursor-pointer" data-index="${i}" onchange="updateStats(this, ${i})"/>
          </td>
        </tr>
      `).join('');

    } catch (err) {
      showMessage('Failed to load students', 'error');
    }
  }

  function updateStats(checkbox, index) {
    const badge = document.querySelector(`.status-badge-${index}`);
    if (checkbox.checked) {
      badge.textContent = 'Present';
      badge.className = `status-badge-${index} px-2 py-1 rounded-full text-xs font-bold bg-green-100 text-green-800`;
    } else {
      badge.textContent = 'Absent';
      badge.className = `status-badge-${index} px-2 py-1 rounded-full text-xs font-bold bg-red-100 text-red-800`;
    }
    const checks = document.querySelectorAll('.attendance-check');
    const presentCount = [...checks].filter(c => c.checked).length;
    document.getElementById('present-count').textContent = presentCount;
    document.getElementById('absent-count').textContent = checks.length - presentCount;
  }

  async function submitAttendance() {
    const subjectId = document.getElementById('subject-id').value;
    const date = document.getElementById('attendance-date').value;
    const semester = parseInt(document.getElementById('semester').value);

    if (!subjectId || !date || !semester) {
      showMessage('Please fill in Subject ID, Date and Semester', 'error');
      return;
    }

    const checks = document.querySelectorAll('.attendance-check');
    const attendanceDetails = students.map((s, i) => ({
      student_id: s.id,
      status: checks[i].checked ? 'present' : 'absent'
    }));

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Submitting...';

    try {
      const res = await fetch(`${API_URL}/api/attendance`, {
        method: 'POST',
        headers,
        body: JSON.stringify({
          subject_id: subjectId,
          faculty_id: user.faculty_id || user.id,
          date,
          semester,
          attendance_details: attendanceDetails
        })
      });

      if (!res.ok) {
        const data = await res.json();
        throw new Error(data.error || 'Failed to submit');
      }

      showMessage('Attendance submitted successfully!', 'success');
    } catch (err) {
      showMessage('Error: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<span class="material-symbols-outlined">save</span> Submit Attendance';
    }
  }

  function showMessage(msg, type) {
    const box = document.getElementById('message-box');
    box.textContent = msg;
    box.className = `mt-4 p-4 rounded-lg text-sm font-semibold ${
      type === 'success' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'
    }`;
    box.classList.remove('hidden');
    setTimeout(() => box.classList.add('hidden'), 4000);
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '../login_edumanage_erp/code.html';
  }
</script>
</body>
</html>

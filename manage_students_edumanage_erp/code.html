<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EduManage ERP - Student Management</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
          "surface-bright": "#f9f9ff",
          "surface-container-low": "#f1f3ff",
          "surface-container": "#e9edff",
          "surface-container-high": "#e1e8fd",
          "surface-container-lowest": "#ffffff",
          "outline-variant": "#c4c6cf",
          "outline": "#74777f",
          "on-surface-variant": "#43474e",
          "on-surface": "#141b2b",
          "primary": "#022448",
          "on-primary": "#ffffff",
          "primary-container": "#1e3a5f",
          "on-primary-container": "#8aa4cf",
          "on-primary-fixed-variant": "#2d486d",
          "secondary": "#0051d5",
          "error": "#ba1a1a"
        }
      }
    }
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
  body { background-color: #f9f9ff; font-family: 'Inter', sans-serif; }
  .zebra-row:nth-child(even) { background-color: #EFF6FF; }
</style>
</head>
<body class="text-on-surface">

<aside class="flex flex-col h-screen fixed left-0 top-0 py-6 px-4 bg-primary w-64 z-50">
  <div class="mb-10 px-2">
    <h1 class="text-lg font-bold text-white">EduManage ERP</h1>
    <p class="text-xs text-on-primary-container opacity-70 uppercase tracking-widest mt-1">Admin Portal</p>
  </div>
  <nav class="flex-1 space-y-1">
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary-fixed-variant hover:text-white hover:bg-primary-container/20 rounded-lg transition-colors" href="../admin_dashboard_edumanage_erp/code.html">
      <span class="material-symbols-outlined">dashboard</span><span>Dashboard</span>
    </a>
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary-container bg-primary-container rounded-lg font-bold" href="#">
      <span class="material-symbols-outlined">school</span><span>Students</span>
    </a>
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary-fixed-variant hover:text-white hover:bg-primary-container/20 rounded-lg transition-colors" href="../manage_faculty_edumanage_erp/code.html">
      <span class="material-symbols-outlined">badge</span><span>Faculty</span>
    </a>
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary-fixed-variant hover:text-white hover:bg-primary-container/20 rounded-lg transition-colors" href="../fee_management_edumanage_erp/code.html">
      <span class="material-symbols-outlined">payments</span><span>Fees</span>
    </a>
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary-fixed-variant hover:text-white hover:bg-primary-container/20 rounded-lg transition-colors" href="../mark_attendance_faculty_portal/code.html">
      <span class="material-symbols-outlined">calendar_today</span><span>Attendance</span>
    </a>
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary-fixed-variant hover:text-white hover:bg-primary-container/20 rounded-lg transition-colors" href="../enter_marks_faculty_portal/code.html">
      <span class="material-symbols-outlined">grade</span><span>Marks</span>
    </a>
  </nav>
  <div class="mt-auto border-t border-white/10 pt-4">
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary-fixed-variant hover:text-white hover:bg-primary-container/20 rounded-lg transition-colors cursor-pointer" onclick="logout()">
      <span class="material-symbols-outlined">logout</span><span>Logout</span>
    </a>
  </div>
</aside>

<main class="ml-64 min-h-screen">
  <header class="flex justify-between items-center w-full px-6 h-16 sticky top-0 bg-surface-bright border-b border-outline-variant z-40">
  <h2 class="text-xl font-bold text-primary">Student Management</h2>
</header>

  <div class="p-6 max-w-[1280px]">
    <!-- Search -->
    <div class="mb-4 relative w-full max-w-md">
      <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">search</span>
      <input class="w-full pl-10 pr-4 py-2 bg-white border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20" 
             placeholder="Search by enrollment number..." type="text" id="search-input" oninput="searchStudents()"/>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-xl border border-outline-variant overflow-hidden shadow-sm">
      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead class="bg-primary text-white">
            <tr>
              <th class="px-6 py-3 text-xs font-semibold uppercase">Name</th>
              <th class="px-6 py-3 text-xs font-semibold uppercase">Enrollment</th>
              <th class="px-6 py-3 text-xs font-semibold uppercase">Department</th>
              <th class="px-6 py-3 text-xs font-semibold uppercase">Semester</th>
              <th class="px-6 py-3 text-xs font-semibold uppercase">Batch</th>
              <th class="px-6 py-3 text-xs font-semibold uppercase text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="students-table">
            <tr><td colspan="6" class="px-6 py-8 text-center text-on-surface-variant">Loading students...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<!-- Add Student Modal -->
<div id="add-modal" class="fixed inset-0 bg-black/50 z-[100] hidden items-center justify-center">
  <div class="bg-white rounded-xl p-6 w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto">
    <h3 class="text-lg font-bold text-primary mb-4">Add New Student</h3>
    
    <div id="modal-error" class="hidden mb-4 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm"></div>

    <div class="space-y-3">
      <input id="s-name" class="w-full px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20" placeholder="Full Name" type="text"/>
      <input id="s-email" class="w-full px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20" placeholder="Email" type="email"/>
      <input id="s-password" class="w-full px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20" placeholder="Password" type="password"/>
      <input id="s-enrollment" class="w-full px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20" placeholder="Enrollment Number" type="text"/>
      <input id="s-phone" class="w-full px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20" placeholder="Phone (optional)" type="text"/>
      <select id="s-department" class="w-full px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20">
        <option value="">Select Department</option>
      </select>
      <input id="s-semester" class="w-full px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20" placeholder="Semester (1-8)" type="number" min="1" max="8"/>
      <input id="s-batch" class="w-full px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20" placeholder="Batch Year (e.g. 2022)" type="number"/>
      <select id="s-gender" class="w-full px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20">
        <option value="">Select Gender (optional)</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
      </select>
    </div>

    <div class="flex gap-3 mt-6">
      <button onclick="closeAddModal()" class="flex-1 px-4 py-2 border border-outline-variant rounded-lg text-sm font-semibold hover:bg-surface-container-low">Cancel</button>
      <button onclick="addStudent()" id="add-btn" class="flex-1 px-4 py-2 bg-primary text-white rounded-lg text-sm font-semibold hover:opacity-90">Add Student</button>
    </div>
  </div>
</div>

<script>
  const API_URL = 'https://student-erp-backend-v7f3.onrender.com';
  const token = localStorage.getItem('token');

  if (!token) window.location.href = '../login_edumanage_erp/code.html';

  const headers = {
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${token}`
  };

  let allStudents = [];

  async function loadStudents() {
    try {
      const res = await fetch(`${API_URL}/api/students`, { headers });
      allStudents = await res.json();
      renderStudents(allStudents);
    } catch (err) {
      document.getElementById('students-table').innerHTML =
        '<tr><td colspan="6" class="px-6 py-8 text-center text-error">Failed to load students</td></tr>';
    }
  }

  function renderStudents(students) {
    const tbody = document.getElementById('students-table');
    if (!students.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-8 text-center text-on-surface-variant">No students found</td></tr>';
      return;
    }
    tbody.innerHTML = students.map(s => `
      <tr class="zebra-row border-b border-outline-variant/30 hover:bg-primary/5 transition-colors">
        <td class="px-6 py-3">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-surface-container flex items-center justify-center text-primary font-bold text-xs">
              ${(s.users?.full_name || 'NA').split(' ').map(n=>n[0]).join('').slice(0,2)}
            </div>
            <div>
              <p class="font-bold text-primary">${s.users?.full_name || 'N/A'}</p>
              <p class="text-xs text-on-surface-variant">${s.users?.email || ''}</p>
            </div>
          </div>
        </td>
        <td class="px-6 py-3 font-mono text-on-surface-variant">${s.enrollment_number}</td>
        <td class="px-6 py-3">${s.departments?.name || 'N/A'}</td>
        <td class="px-6 py-3">Sem ${s.semester}</td>
        <td class="px-6 py-3">${s.batch_year}</td>
        <td class="px-6 py-3 text-right">
          <button onclick="deleteStudent('${s.id}')" class="p-1.5 text-error hover:bg-red-50 rounded transition-colors">
            <span class="material-symbols-outlined text-lg">delete</span>
          </button>
        </td>
      </tr>
    `).join('');
  }

  function searchStudents() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const filtered = allStudents.filter(s =>
      s.enrollment_number.toLowerCase().includes(q) ||
      (s.users?.full_name || '').toLowerCase().includes(q)
    );
    renderStudents(filtered);
  }

  async function loadDepartments() {
    try {
      const res = await fetch(`${API_URL}/api/departments`, { headers });
      const depts = await res.json();
      const select = document.getElementById('s-department');
      depts.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.id;
        opt.textContent = d.name;
        select.appendChild(opt);
      });
    } catch (err) {}
  }

  function openAddModal() {
    document.getElementById('add-modal').classList.remove('hidden');
    document.getElementById('add-modal').classList.add('flex');
  }

  function closeAddModal() {
    document.getElementById('add-modal').classList.add('hidden');
    document.getElementById('add-modal').classList.remove('flex');
    document.getElementById('modal-error').classList.add('hidden');
  }

  async function addStudent() {
    const btn = document.getElementById('add-btn');
    const errorDiv = document.getElementById('modal-error');
    
    const body = {
      full_name: document.getElementById('s-name').value,
      email: document.getElementById('s-email').value,
      password: document.getElementById('s-password').value,
      enrollment_number: document.getElementById('s-enrollment').value,
      phone: document.getElementById('s-phone').value,
      department_id: document.getElementById('s-department').value,
      semester: parseInt(document.getElementById('s-semester').value),
      batch_year: parseInt(document.getElementById('s-batch').value),
      gender: document.getElementById('s-gender').value || undefined,
    };

    btn.disabled = true;
    btn.textContent = 'Adding...';
    errorDiv.classList.add('hidden');

    try {
      const res = await fetch(`${API_URL}/api/students`, {
        method: 'POST',
        headers,
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(JSON.stringify(data.error));
      closeAddModal();
      loadStudents();
    } catch (err) {
      errorDiv.textContent = 'Error: ' + err.message;
      errorDiv.classList.remove('hidden');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Add Student';
    }
  }

  async function deleteStudent(id) {
    if (!confirm('Are you sure you want to delete this student?')) return;
    try {
      await fetch(`${API_URL}/api/students/${id}`, { method: 'DELETE', headers });
      loadStudents();
    } catch (err) {
      alert('Failed to delete student');
    }
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '../login_edumanage_erp/code.html';
  }

  loadStudents();
  loadDepartments();
</script>
</body>
</html>

<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EduManage ERP - Fee Status</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
          "surface-bright": "#f9f9ff",
          "surface-container-low": "#f1f3ff",
          "surface-container": "#e9edff",
          "surface-container-lowest": "#ffffff",
          "outline-variant": "#c4c6cf",
          "outline": "#74777f",
          "on-surface-variant": "#43474e",
          "on-surface": "#141b2b",
          "primary": "#022448",
          "on-primary": "#ffffff",
          "primary-container": "#1e3a5f",
          "on-primary-container": "#8aa4cf",
          "on-primary-fixed-variant": "#2d486d",
          "secondary": "#0051d5",
          "error": "#ba1a1a"
        }
      }
    }
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
  body { background-color: #f9f9ff; font-family: 'Inter', sans-serif; }
  .zebra-row:nth-child(even) { background-color: #EFF6FF; }
</style>
</head>
<body class="text-on-surface">

<aside class="flex flex-col h-screen fixed left-0 top-0 py-6 px-4 bg-primary w-64 z-50">
  <div class="mb-10 px-2">
    <h1 class="text-lg font-bold text-white">EduManage ERP</h1>
    <p class="text-xs text-on-primary-container opacity-70 uppercase tracking-widest mt-1">Student Portal</p>
  </div>
  <nav class="flex-1 space-y-1">
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary-fixed-variant hover:text-white hover:bg-primary-container/20 rounded-lg transition-colors" href="../my_marks_student_portal/code.html">
      <span class="material-symbols-outlined">grade</span><span>My Marks</span>
    </a>
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary-container bg-primary-container rounded-lg font-bold" href="#">
      <span class="material-symbols-outlined">payments</span><span>Fee Status</span>
    </a>
  </nav>
  <div class="mt-auto border-t border-white/10 pt-4">
    <div class="px-4 py-2">
      <p class="text-sm font-bold text-white" id="student-name">Loading...</p>
      <p class="text-xs text-on-primary-container opacity-70">Student</p>
    </div>
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary-fixed-variant hover:text-white hover:bg-primary-container/20 rounded-lg transition-colors cursor-pointer" onclick="logout()">
      <span class="material-symbols-outlined">logout</span><span>Logout</span>
    </a>
  </div>
</aside>

<main class="ml-64 min-h-screen">
  <header class="flex justify-between items-center w-full px-6 h-16 sticky top-0 bg-surface-bright border-b border-outline-variant z-40">
    <h2 class="text-xl font-bold text-primary">My Fee Status</h2>
  </header>

  <div class="p-6 max-w-[1280px]">

    <!-- Summary Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
      <div class="bg-[#EFF6FF] border border-[#D1E4FF] p-6 rounded-xl">
        <p class="text-xs font-semibold text-on-surface-variant uppercase">Total Amount</p>
        <h3 class="text-3xl font-bold text-primary mt-1" id="total-amount">--</h3>
      </div>
      <div class="bg-[#EFF6FF] border border-[#D1E4FF] p-6 rounded-xl">
        <p class="text-xs font-semibold text-on-surface-variant uppercase">Pending</p>
        <h3 class="text-3xl font-bold text-error mt-1" id="pending-amount">--</h3>
      </div>
      <div class="bg-[#EFF6FF] border border-[#D1E4FF] p-6 rounded-xl">
        <p class="text-xs font-semibold text-on-surface-variant uppercase">Paid</p>
        <h3 class="text-3xl font-bold text-green-700 mt-1" id="paid-count">--</h3>
      </div>
    </div>

    <!-- Fee Table -->
    <div class="bg-white rounded-xl border border-outline-variant overflow-hidden shadow-sm">
      <div class="p-4 border-b border-outline-variant bg-surface-container-low">
        <h4 class="font-bold text-primary">My Fee Records</h4>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead class="bg-primary text-white">
            <tr>
              <th class="px-6 py-3 text-xs font-semibold uppercase">Fee Type</th>
              <th class="px-6 py-3 text-xs font-semibold uppercase">Amount</th>
              <th class="px-6 py-3 text-xs font-semibold uppercase">Due Date</th>
              <th class="px-6 py-3 text-xs font-semibold uppercase">Semester</th>
              <th class="px-6 py-3 text-xs font-semibold uppercase">Status</th>
            </tr>
          </thead>
          <tbody id="fees-table">
            <tr><td colspan="5" class="px-6 py-8 text-center text-on-surface-variant">Loading fees...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<script>
  const API_URL = 'https://student-erp-backend-v7f3.onrender.com';
  const token = localStorage.getItem('token');
  const user = JSON.parse(localStorage.getItem('user') || '{}');

  if (!token) window.location.href = '../login_edumanage_erp/code.html';

  document.getElementById('student-name').textContent = user.full_name || 'Student';

  const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };

  async function loadFees() {
    try {
      // Get student record
      const studentsRes = await fetch(`${API_URL}/api/students`, { headers });
      const students = await studentsRes.json();
      const myStudent = students.find(s => s.user_id === user.id);

      if (!myStudent) {
        document.getElementById('fees-table').innerHTML =
          '<tr><td colspan="5" class="px-6 py-8 text-center text-on-surface-variant">No student record found</td></tr>';
        return;
      }

      const res = await fetch(`${API_URL}/api/fees/student/${myStudent.id}`, { headers });
      const fees = await res.json();

      const totalAmount = fees.reduce((sum, f) => sum + parseFloat(f.amount), 0);
      const pendingFees = fees.filter(f => f.status !== 'paid');
      const pendingAmount = pendingFees.reduce((sum, f) => sum + parseFloat(f.amount), 0);
      const paidCount = fees.filter(f => f.status === 'paid').length;

      document.getElementById('total-amount').textContent = `₹${totalAmount}`;
      document.getElementById('pending-amount').textContent = `₹${pendingAmount}`;
      document.getElementById('paid-count').textContent = `${paidCount} paid`;

      const tbody = document.getElementById('fees-table');
      if (!fees.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-on-surface-variant">No fee records found</td></tr>';
        return;
      }

      tbody.innerHTML = fees.map(f => `
        <tr class="zebra-row border-b border-outline-variant/30">
          <td class="px-6 py-3 font-bold">${f.fee_type}</td>
          <td class="px-6 py-3 font-bold text-primary">₹${f.amount}</td>
          <td class="px-6 py-3 text-on-surface-variant">${f.due_date}</td>
          <td class="px-6 py-3">Sem ${f.semester}</td>
          <td class="px-6 py-3">
            <span class="px-2 py-1 rounded-full text-xs font-bold ${
              f.status === 'paid' ? 'bg-green-100 text-green-800' :
              f.status === 'partial' ? 'bg-yellow-100 text-yellow-800' :
              'bg-red-100 text-red-800'
            }">${f.status}</span>
          </td>
        </tr>
      `).join('');

    } catch (err) {
      document.getElementById('fees-table').innerHTML =
        '<tr><td colspan="5" class="px-6 py-8 text-center text-error">Failed to load fees</td></tr>';
    }
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '../login_edumanage_erp/code.html';
  }

  loadFees();
</script>
</body>
</html>

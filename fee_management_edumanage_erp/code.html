<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EduManage ERP - Fee Management</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
          "surface-bright": "#f9f9ff",
          "surface-container-low": "#f1f3ff",
          "surface-container": "#e9edff",
          "surface-container-lowest": "#ffffff",
          "outline-variant": "#c4c6cf",
          "outline": "#74777f",
          "on-surface-variant": "#43474e",
          "on-surface": "#141b2b",
          "primary": "#022448",
          "on-primary": "#ffffff",
          "primary-container": "#1e3a5f",
          "on-primary-container": "#8aa4cf",
          "on-primary-fixed-variant": "#2d486d",
          "secondary": "#0051d5",
          "error": "#ba1a1a"
        }
      }
    }
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
  body { background-color: #f9f9ff; font-family: 'Inter', sans-serif; }
  .zebra-row:nth-child(even) { background-color: #EFF6FF; }
</style>
</head>
<body class="text-on-surface">

<aside class="flex flex-col h-screen fixed left-0 top-0 py-6 px-4 bg-primary w-64 z-50">
  <div class="mb-10 px-2">
    <h1 class="text-lg font-bold text-white">EduManage ERP</h1>
    <p class="text-xs text-on-primary-container opacity-70 uppercase tracking-widest mt-1">Admin Portal</p>
  </div>
  <nav class="flex-1 space-y-1">
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary-fixed-variant hover:text-white hover:bg-primary-container/20 rounded-lg transition-colors" href="../admin_dashboard_edumanage_erp/code.html">
      <span class="material-symbols-outlined">dashboard</span><span>Dashboard</span>
    </a>
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary-fixed-variant hover:text-white hover:bg-primary-container/20 rounded-lg transition-colors" href="../manage_students_edumanage_erp/code.html">
      <span class="material-symbols-outlined">school</span><span>Students</span>
    </a>
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary-fixed-variant hover:text-white hover:bg-primary-container/20 rounded-lg transition-colors" href="../manage_faculty_edumanage_erp/code.html">
      <span class="material-symbols-outlined">badge</span><span>Faculty</span>
    </a>
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary-container bg-primary-container rounded-lg font-bold" href="#">
      <span class="material-symbols-outlined">payments</span><span>Fees</span>
    </a>
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary-fixed-variant hover:text-white hover:bg-primary-container/20 rounded-lg transition-colors" href="../mark_attendance_faculty_portal/code.html">
      <span class="material-symbols-outlined">calendar_today</span><span>Attendance</span>
    </a>
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary-fixed-variant hover:text-white hover:bg-primary-container/20 rounded-lg transition-colors" href="../enter_marks_faculty_portal/code.html">
      <span class="material-symbols-outlined">grade</span><span>Marks</span>
    </a>
  </nav>
  <div class="mt-auto border-t border-white/10 pt-4">
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary-fixed-variant hover:text-white hover:bg-primary-container/20 rounded-lg transition-colors cursor-pointer" onclick="logout()">
      <span class="material-symbols-outlined">logout</span><span>Logout</span>
    </a>
  </div>
</aside>

<main class="ml-64 min-h-screen">
  <header class="flex justify-between items-center w-full px-6 h-16 sticky top-0 bg-surface-bright border-b border-outline-variant z-40">
    <h2 class="text-xl font-bold text-primary">Fee Management</h2>
    <button onclick="openAddModal()" class="bg-primary text-white px-6 py-2 rounded-lg font-semibold flex items-center gap-2 hover:opacity-90">
      <span class="material-symbols-outlined">add</span> Generate Fee
    </button>
  </header>

  <div class="p-6 max-w-[1280px]">

    <!-- Stats -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
      <div class="bg-[#EFF6FF] border border-[#D1E4FF] p-6 rounded-xl">
        <p class="text-xs font-semibold text-on-surface-variant uppercase">Total Records</p>
        <h3 class="text-3xl font-bold text-primary mt-1" id="total-fees">--</h3>
      </div>
      <div class="bg-[#EFF6FF] border border-[#D1E4FF] p-6 rounded-xl">
        <p class="text-xs font-semibold text-on-surface-variant uppercase">Pending / Partial</p>
        <h3 class="text-3xl font-bold text-error mt-1" id="pending-fees">--</h3>
      </div>
      <div class="bg-[#EFF6FF] border border-[#D1E4FF] p-6 rounded-xl">
        <p class="text-xs font-semibold text-on-surface-variant uppercase">Fully Paid</p>
        <h3 class="text-3xl font-bold text-green-700 mt-1" id="paid-fees">--</h3>
      </div>
    </div>

    <!-- Filter -->
    <div class="mb-4 flex gap-3">
      <select id="status-filter" onchange="filterFees()" class="px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none bg-white">
        <option value="">All Status</option>
        <option value="paid">Paid</option>
        <option value="unpaid">Unpaid</option>
        <option value="partial">Partial</option>
      </select>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-xl border border-outline-variant overflow-hidden shadow-sm">
      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead class="bg-primary text-white">
            <tr>
              <th class="px-6 py-3 text-xs font-semibold uppercase">Student</th>
              <th class="px-6 py-3 text-xs font-semibold uppercase">Fee Type</th>
              <th class="px-6 py-3 text-xs font-semibold uppercase">Amount</th>
              <th class="px-6 py-3 text-xs font-semibold uppercase">Due Date</th>
              <th class="px-6 py-3 text-xs font-semibold uppercase">Semester</th>
              <th class="px-6 py-3 text-xs font-semibold uppercase">Status</th>
              <th class="px-6 py-3 text-xs font-semibold uppercase text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="fees-table">
            <tr><td colspan="7" class="px-6 py-8 text-center text-on-surface-variant">Loading fees...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<!-- Add Fee Modal -->
<div id="add-modal" class="fixed inset-0 bg-black/50 z-[100] hidden items-center justify-center">
  <div class="bg-white rounded-xl p-6 w-full max-w-lg mx-4">
    <h3 class="text-lg font-bold text-primary mb-4">Generate Fee</h3>
    <div id="modal-error" class="hidden mb-4 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm"></div>
    <div class="space-y-3">
      <select id="f-student" class="w-full px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20">
        <option value="">Select Student</option>
      </select>
      <input id="f-amount" class="w-full px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20" placeholder="Amount" type="number"/>
      <input id="f-type" class="w-full px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20" placeholder="Fee Type (e.g. tuition, hostel)" type="text"/>
      <input id="f-due" class="w-full px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20" placeholder="Due Date" type="date"/>
      <input id="f-semester" class="w-full px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20" placeholder="Semester" type="number" min="1" max="8"/>
    </div>
    <div class="flex gap-3 mt-6">
      <button onclick="closeAddModal()" class="flex-1 px-4 py-2 border border-outline-variant rounded-lg text-sm font-semibold hover:bg-surface-container-low">Cancel</button>
      <button onclick="addFee()" id="add-btn" class="flex-1 px-4 py-2 bg-primary text-white rounded-lg text-sm font-semibold hover:opacity-90">Generate</button>
    </div>
  </div>
</div>

<script>
  const API_URL = 'https://student-erp-backend-v7f3.onrender.com';
  const token = localStorage.getItem('token');
  if (!token) window.location.href = '../login_edumanage_erp/code.html';

  const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
  let allFees = [];

  async function loadFees() {
    try {
      const res = await fetch(`${API_URL}/api/fees`, { headers });
      allFees = await res.json();
      document.getElementById('total-fees').textContent = allFees.length;
      document.getElementById('pending-fees').textContent = allFees.filter(f => f.status !== 'paid').length;
      document.getElementById('paid-fees').textContent = allFees.filter(f => f.status === 'paid').length;
      renderFees(allFees);
    } catch (err) {
      document.getElementById('fees-table').innerHTML =
        '<tr><td colspan="7" class="px-6 py-8 text-center text-error">Failed to load fees</td></tr>';
    }
  }

  function renderFees(fees) {
    const tbody = document.getElementById('fees-table');
    if (!fees.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-8 text-center text-on-surface-variant">No fee records found</td></tr>';
      return;
    }
    tbody.innerHTML = fees.map(f => `
      <tr class="zebra-row border-b border-outline-variant/30">
        <td class="px-6 py-3 font-bold">${f.students?.users?.full_name || 'N/A'}</td>
        <td class="px-6 py-3">${f.fee_type}</td>
        <td class="px-6 py-3 font-bold text-primary">₹${f.amount}</td>
        <td class="px-6 py-3 text-on-surface-variant">${f.due_date}</td>
        <td class="px-6 py-3">Sem ${f.semester}</td>
        <td class="px-6 py-3">
          <span class="px-2 py-1 rounded-full text-xs font-bold ${
            f.status === 'paid' ? 'bg-green-100 text-green-800' :
            f.status === 'partial' ? 'bg-yellow-100 text-yellow-800' :
            'bg-red-100 text-red-800'
          }">${f.status}</span>
        </td>
        <td class="px-6 py-3 text-right">
          ${f.status !== 'paid' ? `
          <button onclick="markPaid('${f.id}')" class="px-3 py-1 bg-green-100 text-green-800 rounded text-xs font-bold hover:bg-green-200">
            Mark Paid
          </button>` : ''}
        </td>
      </tr>
    `).join('');
  }

  function filterFees() {
    const status = document.getElementById('status-filter').value;
    const filtered = status ? allFees.filter(f => f.status === status) : allFees;
    renderFees(filtered);
  }

  async function loadStudents() {
    try {
      const res = await fetch(`${API_URL}/api/students`, { headers });
      const students = await res.json();
      const select = document.getElementById('f-student');
      students.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = `${s.users?.full_name} (${s.enrollment_number})`;
        select.appendChild(opt);
      });
    } catch (err) {}
  }

  function openAddModal() {
    document.getElementById('add-modal').classList.remove('hidden');
    document.getElementById('add-modal').classList.add('flex');
  }

  function closeAddModal() {
    document.getElementById('add-modal').classList.add('hidden');
    document.getElementById('add-modal').classList.remove('flex');
    document.getElementById('modal-error').classList.add('hidden');
  }

  async function addFee() {
    const btn = document.getElementById('add-btn');
    const errorDiv = document.getElementById('modal-error');
    const body = {
      student_id: document.getElementById('f-student').value,
      amount: parseFloat(document.getElementById('f-amount').value),
      fee_type: document.getElementById('f-type').value,
      due_date: document.getElementById('f-due').value,
      semester: parseInt(document.getElementById('f-semester').value),
    };

    btn.disabled = true;
    btn.textContent = 'Generating...';
    errorDiv.classList.add('hidden');

    try {
      const res = await fetch(`${API_URL}/api/fees`, {
        method: 'POST', headers, body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(JSON.stringify(data.error));
      closeAddModal();
      loadFees();
    } catch (err) {
      errorDiv.textContent = 'Error: ' + err.message;
      errorDiv.classList.remove('hidden');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Generate';
    }
  }

  async function markPaid(feeId) {
    try {
      await fetch(`${API_URL}/api/fees/${feeId}/payments`, {
        method: 'POST',
        headers,
        body: JSON.stringify({
          amount_paid: allFees.find(f => f.id === feeId)?.amount || 0,
          payment_mode: 'cash'
        })
      });
      loadFees();
    } catch (err) {
      alert('Failed to update payment');
    }
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '../login_edumanage_erp/code.html';
  }

  loadFees();
  loadStudents();
</script>
</body>
</html>

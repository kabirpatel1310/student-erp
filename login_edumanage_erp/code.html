<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | EduManage ERP</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

          extend: {
            "colors": {
                    "surface-bright": "#f9f9ff",
                    "on-secondary": "#ffffff",
                    "tertiary-fixed-dim": "#c0c7d0",

                    "surface-dim": "#d3daef",
                    "tertiary": "#1d252b",

                    "surface-container-highest": "#dce2f7",
                    "on-primary": "#ffffff",

                    "inverse-surface": "#293040",
                    "on-tertiary-fixed": "#151c23",
                    "on-error-container": "#93000a",
                    "surface-container": "#e9edff",
                    "on-primary-fixed-variant": "#2d486d",
                    "outline-variant": "#c4c6cf",
                    "surface-container-lowest": "#ffffff",
                    "background": "#f9f9ff",
                    "surface-container-low": "#f1f3ff",
                    "inverse-primary": "#adc8f5",
                    "error": "#ba1a1a",
                    "on-error": "#ffffff",
                    "error-container": "#ffdad6",
                    "outline": "#74777f",
                    "on-tertiary": "#ffffff",
                    "on-secondary-fixed": "#00174b",
                    "surface": "#f9f9ff",
                    "inverse-on-surface": "#edf0ff",
                    "on-tertiary-fixed-variant": "#40484f",
                    "on-primary-fixed": "#001c3b",
                    "on-secondary-fixed-variant": "#003ea8",
                    "surface-tint": "#455f87",
                    "tertiary-fixed": "#dce3ec",
                    "on-tertiary-container": "#9ca4ac",
                    "secondary-fixed": "#dbe1ff",
                    "on-surface-variant": "#43474e",
                    "secondary-container": "#316bf3",
                    "primary-container": "#1e3a5f",
                    "primary-fixed": "#d5e3ff",
                    "primary": "#022448",
                    "surface-variant": "#dce2f7",
                    "on-surface": "#141b2b",
                    "on-primary-container": "#8aa4cf",
                    "secondary-fixed-dim": "#b4c5ff",
                    "primary-fixed-dim": "#adc8f5",
                    "secondary": "#0051d5",
                    "on-background": "#141b2b",

            },

                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"

            "spacing": {
                    "lg": "24px",
                    "gutter": "24px",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9f9ff;
        }
        .login-card {
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            border: 1px solid #D1E4FF;
        }
        .input-focus-ring:focus {
            outline: none;
            border-color: #2563EB;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-gov-dark">
<main class="w-full max-w-md px-md">
<!-- Login Card Container -->
<div class="login-card bg-gov-card rounded-lg p-xl flex flex-col items-center">
<!-- Logo Section -->
<div class="mb-xl text-center">
<div class="flex items-center justify-center mb-sm">
<div class="w-12 h-12 bg-primary rounded-lg flex items-center justify-center text-on-primary">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">school</span>
</div>
</div>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">EduManage ERP</h1>
<p class="font-label-bold text-label-bold text-on-surface-variant uppercase mt-xs">Institutional Access Portal</p>
</div>
<!-- Form Section -->
<form action="#" class="w-full space-y-lg" method="POST">
<!-- Email Field -->
<div class="space-y-sm">
<label class="block font-label-bold text-label-bold text-on-surface-variant" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg">alternate_email</span>
</div>
<input class="block w-full pl-xl pr-md py-md bg-white border border-outline-variant rounded-lg font-body-md text-body-md text-gov-dark input-focus-ring transition-all" id="email" name="email" placeholder="admin@institution.edu" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-sm">
<div class="flex justify-between items-center">
<label class="block font-label-bold text-label-bold text-on-surface-variant" for="password">Password</label>
<a class="text-label-bold font-label-bold text-gov-blue hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg">lock</span>
</div>
<input class="block w-full pl-xl pr-md py-md bg-white border border-outline-variant rounded-lg font-body-md text-body-md text-gov-dark input-focus-ring transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 text-gov-blue focus:ring-gov-blue border-outline-variant rounded" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-sm block font-body-sm text-body-sm text-on-surface-variant" for="remember-me">
                        Remember this device
                    </label>
</div>
<!-- Login Button -->
<div>
<button class="group relative w-full flex justify-center py-md px-lg border border-transparent font-title-sm text-title-sm rounded-lg text-white bg-gov-blue hover:bg-secondary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gov-blue transition-colors duration-200" type="submit">
<span class="absolute left-0 inset-y-0 flex items-center pl-md">
<span class="material-symbols-outlined text-white/50 group-hover:text-white transition-colors">login</span>
</span>
                        Login
                    </button>
</div>
</form>
<!-- Security Footer inside card -->
<div class="mt-xl pt-lg border-t border-outline-variant w-full text-center">
<div class="flex items-center justify-center space-x-sm text-on-surface-variant">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="font-label-bold text-label-bold">Secure Multi-Factor Authentication Enabled</span>
</div>
</div>
</div>
<!-- External Footer -->
<footer class="mt-lg text-center space-y-sm">
<p class="font-body-sm text-body-sm text-outline">
                © 2024 Educational Management Systems. All rights reserved.
            </p>
<div class="flex justify-center space-x-lg">
<a class="font-label-bold text-label-bold text-on-surface-variant hover:text-primary" href="#">System Status</a>
<a class="font-label-bold text-label-bold text-on-surface-variant hover:text-primary" href="#">Privacy Policy</a>
<a class="font-label-bold text-label-bold text-on-surface-variant hover:text-primary" href="#">Support</a>
</div>
</footer>
</main>
<!-- Visual Atmosphere: Subtle Grid Pattern -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute inset-0 opacity-[0.03]" style="background-image: radial-gradient(#1E3A5F 0.5px, transparent 0.5px); background-size: 24px 24px;">
</div>
</div>
<script>
        // Simple interactive feedback for the login button
        document.querySelector('form').addEventListener('submit', function(e) {
            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin mr-2">sync</span> Authenticatiing...';
            
            // Artificial delay for visual feedback
            setTimeout(() => {
                // In a real scenario, the form would submit here
                console.log("Authentication request sent...");
            }, 1000);
        });
    </script>
</body></html>
